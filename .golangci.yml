version: "2"
linters:
  default: none
  enable:
    - contextcheck
    - errcheck
    - godot
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
    - whitespace
  settings:
    misspell:
      locale: UK
      ignore-rules:
        - standardize  # hujson library uses US spelling
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
